<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>yt-dlp-GUI — Explorações de interface</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ydg-bg: #0d1117;
    --ydg-bg2: #0f151e;
    --ydg-panel: #151c27;
    --ydg-panel2: #18202d;
    --ydg-border: #232d3d;
    --ydg-border2: #2d3a50;
    --ydg-text: #e7ecf4;
    --ydg-text2: #94a1b5;
    --ydg-text3: #5d6b80;
    --ydg-accent: #3b82d6;
    --ydg-radius: 10px;
    --ydg-sans: "Geist", "Helvetica Neue", sans-serif;
    --ydg-mono: "JetBrains Mono", monospace;
  }

  /* ---------- Janela ---------- */
  .ydg-win {
    display: flex; flex-direction: column;
    background: var(--ydg-bg); color: var(--ydg-text);
    font-family: var(--ydg-sans); font-size: 14px;
    border-radius: 10px; overflow: hidden;
    border: 1px solid #1b2433;
  }
  .ydg-tbar {
    display: flex; align-items: center; justify-content: space-between;
    height: 40px; padding-left: 14px; flex: none;
    background: var(--ydg-bg2); border-bottom: 1px solid #1b2433;
    user-select: none;
  }
  .ydg-tbar-left { display: flex; align-items: center; gap: 9px; }
  .ydg-mark {
    width: 19px; height: 19px; border-radius: 5px;
    background: var(--ydg-accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
  }
  .ydg-tbar-title { font-size: 13px; font-weight: 550; color: #c6cfdb; letter-spacing: 0.01em; }
  .ydg-tbar-ver { font-family: var(--ydg-mono); font-size: 10.5px; color: var(--ydg-text3); padding-top: 1px; }
  .ydg-tbar-btns { display: flex; align-self: stretch; }
  .ydg-tbtn {
    width: 44px; display: flex; align-items: center; justify-content: center;
    color: var(--ydg-text3); cursor: default;
  }
  .ydg-tbtn:hover { background: #1a2330; color: var(--ydg-text2); }
  .ydg-tbtn-close:hover { background: #b13a47; color: #fff; }
  .ydg-body { flex: 1; min-height: 0; padding: 0 40px; }

  .ydg-center {
    max-width: 760px; margin: 0 auto;
    display: flex; flex-direction: column;
  }
  .ydg-rel { position: relative; }
  .ydg-mono { font-family: var(--ydg-mono); }

  /* ---------- Barra de URL ---------- */
  .ydg-bar {
    display: flex; align-items: center; height: 52px;
    background: var(--ydg-panel);
    border: 1px solid var(--ydg-border);
    border-radius: var(--ydg-radius);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .ydg-bar:focus-within {
    border-color: var(--ydg-accent);
    box-shadow: 0 0 0 3px color-mix(in oklab, var(--ydg-accent) 22%, transparent);
  }
  .ydg-bar.is-error {
    border-color: #c4516a;
    box-shadow: 0 0 0 3px rgba(196, 81, 106, 0.18);
    animation: ydg-shake 0.4s;
  }
  @keyframes ydg-shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-3px); }
  }
  .ydg-bar-icon {
    display: flex; align-items: center;
    padding: 0 4px 0 16px; color: var(--ydg-text3);
  }
  .ydg-input {
    flex: 1; min-width: 0; align-self: stretch;
    background: transparent; border: none; outline: none;
    color: var(--ydg-text); font-family: var(--ydg-sans); font-size: 14.5px;
    padding: 0 12px;
  }
  .ydg-input::placeholder { color: var(--ydg-text3); }
  .ydg-input-mono { font-family: var(--ydg-mono); font-size: 13px; }
  .ydg-fmt-trigger {
    display: flex; align-items: center; gap: 7px; align-self: stretch;
    padding: 0 14px; cursor: pointer;
    background: transparent; border: none;
    border-left: 1px solid var(--ydg-border);
    color: var(--ydg-text2); font-family: var(--ydg-sans);
    font-size: 13.5px; font-weight: 550;
  }
  .ydg-fmt-trigger:hover, .ydg-fmt-trigger.is-open { background: var(--ydg-panel2); color: var(--ydg-text); }
  .ydg-dl-btn {
    display: flex; align-items: center; gap: 8px; align-self: stretch;
    padding: 0 20px; margin: -1px -1px -1px 0; cursor: pointer;
    background: var(--ydg-accent); border: none;
    border-radius: 0 var(--ydg-radius) var(--ydg-radius) 0;
    color: #fff; font-family: var(--ydg-sans); font-size: 14px; font-weight: 600;
    letter-spacing: 0.01em;
    transition: filter 0.12s;
  }
  .ydg-dl-btn:hover { filter: brightness(1.12); }
  .ydg-dl-btn:active { filter: brightness(0.94); }

  /* ---------- Menus suspensos ---------- */
  .ydg-menu {
    position: absolute; z-index: 50;
    background: #161e2b; border: 1px solid var(--ydg-border2);
    border-radius: 10px; padding: 5px;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5), 0 2px 8px rgba(0, 0, 0, 0.4);
  }
  .ydg-menu-h {
    font-size: 10.5px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase;
    color: var(--ydg-text3); padding: 7px 10px 4px;
  }
  .ydg-menu-item {
    display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 7px 10px; border: none; border-radius: 7px; cursor: pointer;
    background: transparent; color: var(--ydg-text2);
    font-family: var(--ydg-sans); font-size: 13px; text-align: left;
  }
  .ydg-menu-item:hover { background: #1d2737; color: var(--ydg-text); }
  .ydg-menu-item.is-active { color: var(--ydg-text); }
  .ydg-menu-name { font-weight: 550; min-width: 42px; }
  .ydg-menu-desc { flex: 1; font-size: 11.5px; color: var(--ydg-text3); }

  /* ---------- Pílula / select de qualidade ---------- */
  .ydg-pill, .ydg-select {
    display: flex; align-items: center; gap: 8px;
    background: var(--ydg-panel); border: 1px solid var(--ydg-border);
    border-radius: calc(var(--ydg-radius) - 2px);
    padding: 7px 12px; cursor: pointer;
    font-family: var(--ydg-sans); font-size: 13px; color: var(--ydg-text);
  }
  .ydg-pill:hover, .ydg-select:hover { border-color: var(--ydg-border2); background: var(--ydg-panel2); }
  .ydg-pill-label { color: var(--ydg-text3); }
  .ydg-pill-value, .ydg-select-value { font-weight: 550; }
  .ydg-under-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 12px;
  }
  .ydg-dest {
    display: flex; align-items: center; gap: 7px;
    color: var(--ydg-text3); font-size: 12.5px; font-family: var(--ydg-mono);
  }

  /* ---------- Fila ---------- */
  .ydg-queue { margin-top: 34px; display: flex; flex-direction: column; min-height: 0; }
  .ydg-queue-h {
    display: flex; align-items: baseline; gap: 8px;
    font-size: 11.5px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase;
    color: var(--ydg-text3); margin-bottom: 12px;
  }
  .ydg-queue-count {
    font-family: var(--ydg-mono); font-size: 11px; letter-spacing: 0;
    background: var(--ydg-panel2); border: 1px solid var(--ydg-border);
    border-radius: 99px; padding: 1px 7px; color: var(--ydg-text2);
  }
  .ydg-prog {
    height: 5px; border-radius: 99px; overflow: hidden;
    background: #1c2532;
  }
  .ydg-prog-fill {
    height: 100%; border-radius: 99px;
    background: var(--ydg-accent);
    transition: width 0.35s linear;
  }
  .ydg-prog-fill.is-done { opacity: 0.4; }
  .ydg-pct { font-family: var(--ydg-mono); font-size: 12px; color: var(--ydg-text2); }
  .ydg-icon-btn {
    width: 24px; height: 24px; flex: none;
    display: flex; align-items: center; justify-content: center;
    background: transparent; border: none; border-radius: 6px; cursor: pointer;
    color: var(--ydg-text3);
  }
  .ydg-icon-btn:hover { background: #222d3e; color: var(--ydg-text); }
  .ydg-badge {
    font-family: var(--ydg-mono); font-size: 10px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.04em;
    background: color-mix(in oklab, var(--ydg-accent) 16%, transparent);
    color: color-mix(in oklab, var(--ydg-accent) 75%, #fff);
    border-radius: 4px; padding: 2px 6px;
  }

  /* Variação A — cartões */
  .ydg-cards { display: flex; flex-direction: column; gap: 10px; }
  .ydg-card {
    display: flex; align-items: center; gap: 14px;
    background: var(--ydg-panel); border: 1px solid var(--ydg-border);
    border-radius: var(--ydg-radius); padding: 12px 14px;
  }
  .ydg-thumb {
    width: 86px; height: 48px; flex: none; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    background: repeating-linear-gradient(45deg, #1a2230 0 6px, #151c27 6px 12px);
    border: 1px solid var(--ydg-border);
  }
  .ydg-card-mid { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 7px; }
  .ydg-card-title {
    font-size: 13.5px; font-weight: 550; color: var(--ydg-text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ydg-card-meta {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--ydg-text3);
    white-space: nowrap;
  }
  .ydg-speed { font-family: var(--ydg-mono); font-size: 11.5px; color: var(--ydg-text2); }
  .ydg-queued, .ydg-done { display: flex; align-items: center; gap: 4px; font-size: 11.5px; }
  .ydg-done { color: color-mix(in oklab, var(--ydg-accent) 70%, #fff); }
  .ydg-card-side {
    display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex: none;
  }

  /* Variação B — extensão acoplada + linhas densas */
  .ydg-bar:has(+ .ydg-bar-ext) { border-radius: var(--ydg-radius) var(--ydg-radius) 0 0; }
  .ydg-bar:has(+ .ydg-bar-ext) .ydg-dl-btn { border-radius: 0 var(--ydg-radius) 0 0; }
  .ydg-bar-ext {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    background: var(--ydg-bg2);
    border: 1px solid var(--ydg-border); border-top: none;
    border-radius: 0 0 var(--ydg-radius) var(--ydg-radius);
    padding: 9px 14px;
  }
  .ydg-chip-rows { display: flex; align-items: center; gap: 20px; }
  .ydg-chip-group { display: flex; align-items: center; gap: 9px; }
  .ydg-chip-group-label {
    font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ydg-text3);
  }
  .ydg-chips { display: flex; gap: 4px; }
  .ydg-chip {
    padding: 5px 11px; border: none; border-radius: 7px; cursor: pointer;
    background: transparent; color: var(--ydg-text2);
    font-family: var(--ydg-sans); font-size: 12.5px; font-weight: 500;
  }
  .ydg-chip:hover { background: var(--ydg-panel2); color: var(--ydg-text); }
  .ydg-chip.is-active { background: var(--ydg-accent); color: #fff; }
  .ydg-ext-right { display: flex; align-items: center; gap: 9px; }
  .ydg-ext-label { font-size: 12px; color: var(--ydg-text3); }
  .ydg-rows {
    display: flex; flex-direction: column;
    border: 1px solid var(--ydg-border); border-radius: var(--ydg-radius);
    background: var(--ydg-panel); overflow: hidden;
  }
  .ydg-row {
    display: grid; align-items: center; gap: 12px;
    grid-template-columns: 8px minmax(0, 1fr) auto 52px 110px 70px 38px 24px;
    padding: 11px 14px;
    border-bottom: 1px solid #1c2533;
  }
  .ydg-row:last-child { border-bottom: none; }
  .ydg-dot {
    width: 7px; height: 7px; border-radius: 99px;
    border: 1.5px solid var(--ydg-text3); background: transparent;
  }
  .ydg-dot.is-active { background: var(--ydg-accent); border-color: var(--ydg-accent); animation: ydg-pulse 1.4s ease-in-out infinite; }
  .ydg-dot.is-done { background: var(--ydg-text3); border-color: var(--ydg-text3); }
  @keyframes ydg-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  .ydg-row-title {
    font-size: 13px; color: var(--ydg-text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ydg-row-q { font-size: 12px; color: var(--ydg-text3); font-family: var(--ydg-mono); }
  .ydg-row-speed { font-family: var(--ydg-mono); font-size: 11px; color: var(--ydg-text3); text-align: right; }
  .ydg-row .ydg-pct { text-align: right; }

  /* Variação C — painel acoplado + fila mono */
  .ydg-bar.is-open { border-color: var(--ydg-border2); }
  .ydg-panel {
    position: absolute; z-index: 50; left: 0; right: 0; top: calc(100% + 8px);
    display: grid; grid-template-columns: 1fr 1fr; gap: 2px 14px;
    background: #141b26; border: 1px solid var(--ydg-border2);
    border-radius: var(--ydg-radius); padding: 10px;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.55), 0 2px 8px rgba(0, 0, 0, 0.4);
  }
  .ydg-panel-col { display: flex; flex-direction: column; gap: 2px; }
  .ydg-panel-h {
    font-family: var(--ydg-mono); font-size: 10.5px; letter-spacing: 0.09em; text-transform: uppercase;
    color: var(--ydg-text3); padding: 5px 10px 6px;
  }
  .ydg-panel-item {
    display: flex; align-items: baseline; justify-content: space-between; gap: 10px;
    padding: 8px 10px; border: none; border-radius: 7px; cursor: pointer;
    background: transparent; text-align: left;
  }
  .ydg-panel-item:hover { background: #1d2737; }
  .ydg-panel-item.is-active {
    background: color-mix(in oklab, var(--ydg-accent) 14%, transparent);
    box-shadow: inset 0 0 0 1px color-mix(in oklab, var(--ydg-accent) 45%, transparent);
  }
  .ydg-panel-name { font-family: var(--ydg-mono); font-size: 13px; font-weight: 500; color: var(--ydg-text); }
  .ydg-panel-item.is-active .ydg-panel-name { color: color-mix(in oklab, var(--ydg-accent) 75%, #fff); }
  .ydg-panel-desc { font-size: 11.5px; color: var(--ydg-text3); }
  .ydg-rail {
    display: flex; align-items: center; gap: 3px; margin-top: 12px;
    font-family: var(--ydg-mono); font-size: 12px;
  }
  .ydg-rail-label {
    font-family: var(--ydg-sans); font-size: 12px; color: var(--ydg-text3); margin-right: 9px;
  }
  .ydg-rail-opt {
    padding: 5px 10px; border: none; border-radius: 6px; cursor: pointer;
    background: transparent; color: var(--ydg-text3);
    font-family: var(--ydg-mono); font-size: 12px;
  }
  .ydg-rail-opt:hover { color: var(--ydg-text2); background: var(--ydg-panel); }
  .ydg-rail-opt.is-active {
    background: color-mix(in oklab, var(--ydg-accent) 16%, transparent);
    color: color-mix(in oklab, var(--ydg-accent) 78%, #fff);
  }
  .ydg-mrows { display: flex; flex-direction: column; }
  .ydg-mrow { padding: 11px 2px 13px; border-bottom: 1px solid #1a2230; }
  .ydg-mrow:last-child { border-bottom: none; }
  .ydg-mrow-top {
    display: grid; align-items: center; gap: 12px;
    grid-template-columns: 44px minmax(0, 1fr) auto 44px 24px;
    margin-bottom: 9px;
  }
  .ydg-mrow-fmt {
    font-family: var(--ydg-mono); font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.04em;
    color: color-mix(in oklab, var(--ydg-accent) 75%, #fff);
  }
  .ydg-mrow-title {
    font-size: 13px; color: var(--ydg-text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ydg-mrow-status { font-family: var(--ydg-mono); font-size: 11px; color: var(--ydg-text3); }
  .ydg-mrow-pct { font-family: var(--ydg-mono); font-size: 12px; color: var(--ydg-text2); text-align: right; }
  .ydg-prog-thin { height: 3px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link id="gfont-Ubuntu" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;600;700&amp;display=swap">
<link id="gfont-Merriweather" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;500;600;700&amp;display=swap">
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="starter/design-canvas.jsx"></script>
<script type="text/babel" src="starter/tweaks-panel.jsx"></script>
<script type="text/babel" src="app-shared.jsx"></script>
<script type="text/babel" src="variation-1.jsx"></script>
<script type="text/babel" src="variation-2.jsx"></script>
<script type="text/babel" src="variation-3.jsx"></script>
<script type="text/babel">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "#2fa572",
    "radius": 10
  }/*EDITMODE-END*/;

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

    React.useEffect(function () {
      document.documentElement.style.setProperty('--ydg-accent', t.accent);
      document.documentElement.style.setProperty('--ydg-radius', t.radius + 'px');
    }, [t.accent, t.radius]);

    return (
      <React.Fragment>
        <DesignCanvas>
          <DCSection
            id="gui"
            title="yt-dlp-GUI — explorações de interface"
            subtitle="3 variações interativas: cole um link (ou clique em Download), troque formato e qualidade, e veja a fila simular o progresso. Tema escuro azulado, destaque azul."
          >
            <DCArtboard id="var-a" label="A · Barra integrada — formato acoplado dentro da barra" width={1020} height={660}>
              <YdgVariationA />
            </DCArtboard>
            <DCArtboard id="var-b" label="B · Chips segmentados — formatos sempre visíveis sob a barra" width={1020} height={660}>
              <YdgVariationB />
            </DCArtboard>
            <DCArtboard id="var-c" label="C · Painel acoplado — tom técnico, grade de formatos" width={1020} height={660}>
              <YdgVariationC />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
        <TweaksPanel>
          <TweakSection label="Tema" />
          <TweakColor label="Cor de destaque" value={t.accent}
            options={['#3b82d6', '#d64f5c', '#2fa572', '#8b7fd6']}
            onChange={function (v) { setTweak('accent', v); }} />
          <TweakSlider label="Raio dos cantos" value={t.radius} min={4} max={16} step={1} unit="px"
            onChange={function (v) { setTweak('radius', v); }} />
        </TweaksPanel>
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
